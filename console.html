<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legacy Value Partners CI - onboarding console</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!--
    Operator Console v2. Single page, no navigation, no login wall.
    Reads the GAS backend directly: ?api=list for the board, ?api=process
    for the drawer. The AKfycb deployment URL is the credential.
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap');
    :root{--navy:#0D3F6A;--navy7:#0a3257;--gold:#FFB42C;--paper:#F7F8FA;--card:#fff;
      --ink:#1A2330;--muted:#6B7888;--line:#E6EAEF;--green:#2E9E5B;--red:#E0413E;--amber:#E08A1E;}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:"Assistant",Arial,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
    .hd{position:sticky;top:0;z-index:5;background:var(--navy);color:#fff;padding:12px 16px;box-shadow:0 2px 8px rgba(13,63,106,.18)}
    .hd__row{display:flex;align-items:center;gap:10px;max-width:760px;margin:0 auto}
    .hd__title{font-weight:700;font-size:17px;flex:1}
    .hd__count{font-size:13px;opacity:.85;font-weight:600}
    .hd__tick{font-size:12px;opacity:.7;min-width:46px;text-align:right}
    .hd__ctrls{display:flex;gap:8px;max-width:760px;margin:10px auto 0}
    .search{flex:1;border:none;border-radius:8px;padding:9px 12px;font:inherit;font-size:14px}
    .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:#fff;white-space:nowrap}
    .wrap{max-width:760px;margin:0 auto;padding:14px 12px 96px}
    .lane{margin-bottom:18px}
    .lane__hd{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.04em;
      color:var(--muted);text-transform:uppercase;padding:4px 2px;cursor:pointer;user-select:none}
    .lane__hd--alert{color:var(--red)}
    .lane__badge{background:var(--line);color:var(--ink);border-radius:999px;padding:1px 8px;font-size:11px}
    .lane__hd--alert .lane__badge{background:var(--red);color:#fff}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:8px 0;cursor:pointer;transition:border-color .12s}
    .card:hover{border-color:var(--navy)}
    .card--alert{border-left:3px solid var(--red)}
    .card__l1{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
    .card__name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card__age{font-size:12px;font-weight:600}
    .age0{color:var(--muted)}.age1{color:var(--amber)}.age2{color:var(--red)}
    .dots{display:flex;gap:6px;margin:8px 0 6px}
    .dot{width:8px;height:8px;border-radius:50%;background:#fff;border:1.5px solid #C2CBD4}
    .dot--on{background:var(--navy);border-color:var(--navy)}
    .dot--alert{border-color:var(--red);box-shadow:0 0 0 2px rgba(224,65,62,.25)}
    .card__l2{font-size:13px;color:var(--muted);display:flex;justify-content:space-between;gap:8px}
    .card__next{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
    .empty{color:var(--muted);font-size:14px;text-align:center;padding:40px 0}
    .stale{display:inline-block;background:var(--amber);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:0 5px;margin-left:6px}
    .flowtag{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;margin-right:6px;letter-spacing:.02em}
    .flowtag--onb{background:#EAF1F8;color:var(--navy)} .flowtag--inc{background:#EAF6EE;color:#1c6b3a} .flowtag--wd{background:#FFF1DD;color:#9a6212}
    /* drawer */
    .scrim{position:fixed;inset:0;background:rgba(13,35,55,.45);z-index:10;opacity:0;pointer-events:none;transition:opacity .15s}
    .scrim--on{opacity:1;pointer-events:auto}
    .drawer{position:fixed;z-index:11;background:var(--card);transition:transform .2s ease;overflow-y:auto}
    @media(max-width:768px){.drawer{left:0;right:0;bottom:0;max-height:88vh;border-radius:16px 16px 0 0;transform:translateY(110%)}
      .drawer--on{transform:translateY(0)}}
    @media(min-width:769px){.drawer{top:0;right:0;width:460px;height:100vh;transform:translateX(110%);box-shadow:-8px 0 32px rgba(13,63,106,.18)}
      .drawer--on{transform:translateX(0)}}
    .dw__hd{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:16px;display:flex;align-items:center;gap:10px}
    .dw__title{flex:1;font-weight:700;font-size:16px}
    .dw__sub{font-size:12px;color:var(--muted);font-weight:500}
    .x{border:none;background:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
    .dw__body{padding:16px}
    .banner{border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:14px;font-weight:600}
    .banner--ok{background:#EAF6EE;color:#1c6b3a}.banner--wait{background:#EAF1F8;color:var(--navy)}
    .banner--alert{background:#FBEAEA;color:#9c2622}
    .sec{margin-bottom:22px}
    .sec__h{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .step{display:flex;gap:10px;padding:7px 0;align-items:flex-start}
    .step__n{width:18px;height:18px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
    .st-done .step__n{background:var(--green);color:#fff}
    .st-current .step__n{background:var(--navy);color:#fff;box-shadow:0 0 0 3px rgba(255,180,44,.5)}
    .st-waiting .step__n{background:#fff;border:1.5px solid #C2CBD4;color:transparent}
    .step__main{flex:1;font-size:14px}
    .step__role{font-weight:600}.step__meta{font-size:12px;color:var(--muted)}
    .doc{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
    .doc__k{flex:1}
    .chip{font-size:11px;border-radius:4px;padding:1px 6px;font-weight:600}
    .chip--y{background:#EAF6EE;color:#1c6b3a}.chip--n{background:#F0F2F5;color:var(--muted)}
    .kv{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:4px 0}
    .kv__k{color:var(--muted)}.kv__v{text-align:right;font-weight:500}
    .kv__v--miss{color:var(--amber);font-weight:400;font-style:italic}
    details{margin-bottom:14px}summary{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:6px 0}
    .flag{background:#FFF6E6;border-left:3px solid var(--gold);padding:8px 10px;font-size:12px;border-radius:4px;margin-top:6px}
    .warn{background:#FBEAEA;color:#9c2622;font-size:12px;border-radius:8px;padding:8px 10px;margin-bottom:14px;font-weight:600}
    .hist{font-size:12px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--line)}
    /* actions */
    .fab{position:fixed;right:16px;bottom:18px;z-index:8;background:var(--gold);color:var(--navy);border:none;border-radius:999px;padding:14px 20px;font:inherit;font-weight:700;font-size:15px;box-shadow:0 6px 20px rgba(13,63,106,.28);cursor:pointer}
    .acts{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0}
    .act{border:1px solid var(--navy);background:#fff;color:var(--navy);border-radius:999px;padding:7px 14px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
    .act--primary{background:var(--navy);color:#fff}
    .act--danger{border-color:var(--red);color:var(--red)}
    .act[disabled]{opacity:.5;cursor:default}
    .modal{position:fixed;inset:0;z-index:40;background:rgba(13,35,55,.5);display:none;align-items:center;justify-content:center;padding:20px}
    .modal--on{display:flex}
    .modal__card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px}
    .modal__card h3{margin:0 0 16px;color:var(--navy);font-size:17px}
    .modal__card label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:10px 0 4px}
    .modal__card input,.modal__card select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:14px}
    .modal__row{display:flex;gap:8px;margin-top:18px}
    .modal__row button{flex:1;border-radius:999px;padding:11px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;border:none}
    .btnp{background:var(--navy);color:#fff}.btns{background:#fff;color:var(--muted);border:1px solid var(--line)}
    .copybox{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px;word-break:break-all;margin-top:12px}
    .note{font-size:12px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
  <div class="hd">
    <div class="hd__row">
      <div class="hd__title">Cayman LP operations</div>
      <div class="hd__count" id="count">...</div>
      <div class="hd__tick" id="tick"></div>
    </div>
    <div class="hd__ctrls">
      <input class="search" id="search" placeholder="Search investor...">
      <label class="toggle"><input type="checkbox" id="showdone"> done</label>
    </div>
  </div>
  <div class="wrap" id="board"><div class="empty">Loading...</div></div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-hidden="true"></aside>

  <button class="fab" id="fab" style="display:none">+ Send LP a link</button>
  <div class="modal" id="mintModal">
    <form class="modal__card" id="mintForm">
      <h3>Send an investor their link</h3>
      <label>Investor type</label>
      <select id="mType"><option value="entity">Entity</option><option value="individual">Individual</option></select>
      <label>Investor email</label>
      <input type="email" id="mEmail" placeholder="name@example.com" required>
      <label>Name in English</label>
      <input type="text" id="mName" placeholder="First name is fine">
      <label>שם בעברית</label>
      <input type="text" id="mNameHe" dir="rtl" placeholder="שם פרטי מספיק">
      <div class="note">Fill at least one. The Hebrew name is used on the BDO note.</div>
      <label>Email language</label>
      <select id="mLang"><option value="he">Hebrew (default)</option><option value="en">English</option></select>
      <div class="modal__row"><button type="button" class="btns" id="mCancel">Cancel</button><button type="submit" class="btnp" id="mGo">Create + email</button></div>
      <div id="mResult"></div>
    </form>
  </div>

<script>
(function(){
  var GW='https://script.google.com/macros/s/AKfycbxSu6wp_NHktucOde1kS-rCVeV1IjkMnJxpycHffy62YU7lb4o-A349gF6_wwSiXLywfg/exec';
  var LANES=[
    {key:'alert',label:'Needs you',stages:['needs_attention'],alert:true},
    {key:'signing',label:'Signing',stages:['signing','all_signed']},
    {key:'progress',label:'In progress',stages:['in_progress','submitted','opened']},
    {key:'assembly',label:'Finishing up',stages:['docs_assembled','dispatched']},
    {key:'invited',label:'Invited',stages:['link_sent']},
    {key:'done',label:'Done',stages:['complete','voided','expired'],collapsed:true}
  ];
  var STAGE_LABEL={link_sent:'Invited',opened:'Opened',in_progress:'Filling form',submitted:'Submitted',
    signing:'Signing',all_signed:'Finishing up',docs_assembled:'Finishing up',dispatched:'Drafts ready',
    complete:'Done',needs_attention:'Needs you',voided:'Cancelled',expired:'Expired'};
  var FLOW_LABEL={cayman_subscription:'Onboarding',cayman_increase:'Increase',cayman_withdrawal:'Withdrawal'};
  function flowLabel(f){return FLOW_LABEL[f]||'Onboarding';}
  var POLL_MS=45000, DRAWER_MS=20000;
  var state={list:[],q:'',showDone:false,open:null,collapsed:{done:true}};
  var board=document.getElementById('board');
  var elCount=document.getElementById('count'), elTick=document.getElementById('tick');
  var drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');

  document.getElementById('search').addEventListener('input',function(e){state.q=e.target.value.toLowerCase();render();});
  document.getElementById('showdone').addEventListener('change',function(e){state.showDone=e.target.checked;loadList();});
  scrim.addEventListener('click',closeDrawer);

  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];});}
  function jget(qs){return fetch(GW+qs,{headers:{'Content-Type':'text/plain;charset=utf-8'}}).then(function(r){return r.json();});}

  var lastLoadOk=true;
  function bootBoard(d){state.list=(d&&d.processes)||[];elCount.textContent=state.list.length+' active';render();setInterval(tick,1000);document.getElementById('fab').style.display='block';}
  function loadList(){
    jget('?api=list'+(state.showDone?'&includeDone=1':'')).then(function(d){
      if(d&&d.ok){lastLoadOk=true;state.list=d.processes||[];elCount.textContent=(state.list.length)+' active';render();}
      else{lastLoadOk=false;}
    }).catch(function(){lastLoadOk=false;});
  }
  function dotStrip(idx,alert){
    var h='<div class="dots">';
    for(var i=0;i<6;i++){var on=idx>=0&&i<=idx;var cls='dot'+(on?' dot--on':'')+(alert&&i===Math.max(idx,0)?' dot--alert':'');h+='<span class="'+cls+'"></span>';}
    return h+'</div>';
  }
  function card(p){
    var ageCls=p.ageDays>5?'age2':(p.ageDays>=3?'age1':'age0');
    var flow=flowLabel(p.flowType);
    var flowCls='flowtag flowtag--'+(p.flowType==='cayman_increase'?'inc':p.flowType==='cayman_withdrawal'?'wd':'onb');
    return '<div class="card'+(p.currentStage==='needs_attention'?' card--alert':'')+'" data-id="'+esc(p.processId)+'">'+
      '<div class="card__l1"><span class="'+flowCls+'">'+esc(flow)+'</span><span class="card__name">'+(esc(p.displayName)||'(no name)')+
        (p.stale?'<span class="stale">CHECK</span>':'')+'</span>'+
        '<span class="card__age '+ageCls+'">'+p.ageDays+'d</span></div>'+
      dotStrip(p.stageIndex,p.currentStage==='needs_attention')+
      '<div class="card__l2"><span class="card__next">'+esc(p.nextActionPhrase||STAGE_LABEL[p.currentStage]||p.currentStage)+'</span>'+
        '<span>'+(p.lastActor?esc(p.lastActor):'')+'</span></div>'+
    '</div>';
  }
  function render(){
    var list=state.list.filter(function(p){return !state.q||(p.displayName||'').toLowerCase().indexOf(state.q)>=0;});
    var byStage={};list.forEach(function(p){(byStage[p.currentStage]=byStage[p.currentStage]||[]).push(p);});
    var html='';
    LANES.forEach(function(lane){
      var items=[];lane.stages.forEach(function(s){(byStage[s]||[]).forEach(function(p){items.push(p);});});
      if(!items.length)return;
      var col=(state.collapsed[lane.key]!=null)?state.collapsed[lane.key]:!!lane.collapsed;
      html+='<div class="lane"><div class="lane__hd'+(lane.alert?' lane__hd--alert':'')+'" data-lane="'+lane.key+'">'+
        '<span>'+(col?'&#9656;':'&#9662;')+' '+esc(lane.label)+'</span><span class="lane__badge">'+items.length+'</span></div>';
      if(!col)items.forEach(function(p){html+=card(p);});
      html+='</div>';
    });
    board.innerHTML=html||'<div class="empty">No active processes.</div>';
    board.querySelectorAll('.card').forEach(function(c){c.addEventListener('click',function(){openDrawer(c.getAttribute('data-id'));});});
    board.querySelectorAll('.lane__hd').forEach(function(h){h.addEventListener('click',function(){var k=h.getAttribute('data-lane');state.collapsed[k]=!((state.collapsed[k]!=null)?state.collapsed[k]:LANES.filter(function(l){return l.key===k;})[0].collapsed);render();});});
  }

  // ---- drawer ----
  function openDrawer(id){state.open=id;scrim.classList.add('scrim--on');drawer.classList.add('drawer--on');drawer.setAttribute('aria-hidden','false');drawer.innerHTML='<div class="dw__body"><div class="empty">Loading...</div></div>';loadProcess(id);}
  function closeDrawer(){state.open=null;scrim.classList.remove('scrim--on');drawer.classList.remove('drawer--on');drawer.setAttribute('aria-hidden','true');}
  function loadProcess(id){
    if(state.open!==id)return;
    jget('?api=process&processId='+encodeURIComponent(id)).then(function(d){if(state.open===id&&d&&d.ok)drawDrawer(d);if(state.open===id)setTimeout(function(){loadProcess(id);},DRAWER_MS);}).catch(function(){});
  }
  function bannerFor(d){
    if(d.currentStage==='needs_attention')return['banner--alert','Needs you: '+esc(d.failReason||'a step needs checking.')];
    if(d.currentStage==='complete')return['banner--ok','Done. All documents signed and saved.'];
    if(d.currentStage==='all_signed')return['banner--wait','Everyone signed. Finishing up the file now.'];
    if(d.currentStage==='signing'){var c=(d.signers||[]).filter(function(s){return s.state==='current';})[0];return['banner--wait','Waiting for '+(c?esc(c.roleLabel):'a signer')+' to sign.'];}
    return['banner--wait',esc(STAGE_LABEL[d.currentStage]||d.currentStage)+'.'];
  }
  function drawDrawer(d){
    var b=bannerFor(d);
    var h='<div class="dw__hd"><div><div class="dw__title">'+(esc(d.displayName)||'(no name)')+'</div>'+
      '<div class="dw__sub">'+esc(flowLabel(d.flowType))+' · '+esc(d.applicantType||'')+'</div></div><button class="x" id="xbtn">×</button></div><div class="dw__body">';
    if(d.consoleWarning)h+='<div class="warn">'+esc(d.consoleWarning)+'</div>';
    h+='<div class="banner '+b[0]+'">'+b[1]+'</div>';
    // action buttons (operator)
    var acts=[];
    if(d.currentStage==='needs_attention')acts.push(['reseal','Re-drive seal','act--primary']);
    var cur=(d.signers||[]).filter(function(s){return s.state==='current';})[0];
    if(cur){acts.push(['resendCurrent','Resend link','']);acts.push(['nudge','Nudge','']);}
    if(acts.length)h+='<div class="acts">'+acts.map(function(a){return '<button class="act '+a[2]+'" data-act="'+a[0]+'">'+a[1]+'</button>';}).join('')+'</div>';
    // signers
    if(d.signers&&d.signers.length){
      h+='<div class="sec"><div class="sec__h">Signers ('+d.signersDone+' of '+d.signersPlanned+' signed)</div>';
      d.signers.forEach(function(s){
        var st=s.state==='done'?'st-done':(s.state==='current'?'st-current':'st-waiting');
        h+='<div class="step '+st+'"><span class="step__n">'+(s.state==='done'?'✓':'')+'</span>'+
          '<div class="step__main"><span class="step__role">'+esc(s.roleLabel)+'</span> '+
          '<span class="step__meta">'+(esc(s.name)||'')+(s.state==='current'?' · waiting':'')+'</span></div></div>';
      });
      h+='</div>';
    }
    // docs
    if(d.docs&&d.docs.length){
      h+='<div class="sec"><div class="sec__h">Documents ('+d.docsSummary.sealed+'/'+d.docsSummary.total+' finalized)</div>';
      d.docs.forEach(function(x){
        h+='<div class="doc"><span class="doc__k">'+esc(x.label||x.key)+'</span>'+
          '<span class="chip '+(x.sealed?'chip--y':'chip--n')+'">'+(x.sealed?'finalized':(x.pending?'waiting':'in progress'))+'</span>'+
          '<span class="chip '+(x.delivered?'chip--y':'chip--n')+'">'+(x.delivered?'sent':'not sent')+'</span></div>';
      });
      h+='</div>';
    }
    // classification
    if(d.classification){
      var c=d.classification;
      h+='<div class="sec"><div class="sec__h">Classification</div>'+
        '<div class="kv"><span class="kv__k">W-8 variant</span><span class="kv__v">'+esc(c.w8Variant||'-')+'</span></div>'+
        '<div class="kv"><span class="kv__k">Chapter 4</span><span class="kv__v">'+esc(c.chapter4Status||'-')+'</span></div>'+
        '<div class="kv"><span class="kv__k">Controlling persons</span><span class="kv__v">'+(c.cpRequired?c.cpCount:'none')+'</span></div>';
      (c.counselFlags||[]).forEach(function(f){h+='<div class="flag">'+esc(f.message||f.code)+'</div>';});
      h+='</div>';
    }
    // captured form data (collapsed)
    if(d.submission&&d.submission.sections){
      h+='<details><summary>Captured form data</summary>';
      d.submission.sections.forEach(function(sec){
        h+='<div class="sec"><div class="sec__h">'+esc(sec.name)+'</div>';
        sec.fields.forEach(function(f){h+='<div class="kv"><span class="kv__k">'+esc(f.label)+'</span><span class="kv__v'+(f.missing?' kv__v--miss':'')+'">'+(f.missing?'not provided':esc(f.value))+'</span></div>';});
        h+='</div>';
      });
      if(d.submission.kycDocs&&d.submission.kycDocs.length){
        h+='<div class="sec"><div class="sec__h">KYC uploads</div>';
        d.submission.kycDocs.forEach(function(k){h+='<div class="kv"><span class="kv__k">'+esc(k.slot)+'</span><span class="kv__v"><a href="https://drive.google.com/file/d/'+esc(k.driveId)+'/view" target="_blank">'+(esc(k.fileName)||'open')+'</a></span></div>';});
        h+='</div>';
      }
      h+='</details>';
    }
    // history (collapsed)
    if(d.events&&d.events.length){
      h+='<details><summary>Stage history</summary>';
      d.events.slice().reverse().forEach(function(ev){h+='<div class="hist">'+esc((ev.ts||'').replace('T',' ').slice(0,16))+' · '+esc(ev.stage)+' · '+esc(ev.actor)+'</div>';});
      h+='</details>';
    }
    if(d.currentStage!=='complete'&&d.currentStage!=='voided'&&d.currentStage!=='expired'){
      h+='<details><summary>Danger zone</summary><div class="acts"><button class="act act--danger" data-act="void">Void this process</button></div></details>';
    }
    h+='</div>';
    drawer.innerHTML=h;
    var x=document.getElementById('xbtn');if(x)x.addEventListener('click',closeDrawer);
    drawer.querySelectorAll('[data-act]').forEach(function(btn){btn.addEventListener('click',function(){runAction(btn.getAttribute('data-act'),d.processId,btn);});});
  }

  function runAction(act,pid,btn){
    if(act==='void'&&!window.confirm('Void this process? Held signer links will stop working.'))return;
    var t=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='Working...';}
    jget('?admin='+act+'&processId='+encodeURIComponent(pid)).then(function(r){
      if(btn){btn.disabled=false;btn.textContent=t;}
      window.alert(r&&r.ok?('Done'+(r.role?' ('+r.role+')':'')):('Could not complete: '+((r&&r.error)||'error')));
      loadList();if(state.open===pid)loadProcess(pid);
    }).catch(function(){if(btn){btn.disabled=false;btn.textContent=t;}window.alert('Network error.');});
  }

  // ---- mint a unique LP link ----
  var mintModal=document.getElementById('mintModal');
  document.getElementById('fab').addEventListener('click',function(){document.getElementById('mResult').innerHTML='';mintModal.classList.add('modal--on');});
  document.getElementById('mCancel').addEventListener('click',function(){mintModal.classList.remove('modal--on');});
  document.getElementById('mintForm').addEventListener('submit',function(e){
    e.preventDefault();
    var nEn=document.getElementById('mName').value.trim();
    var nHe=document.getElementById('mNameHe').value.trim();
    if(!nEn&&!nHe){document.getElementById('mResult').innerHTML='<div class="note" style="color:var(--red)">Please enter a name in English or Hebrew.</div>';return;}
    var go=document.getElementById('mGo');go.disabled=true;go.textContent='Working...';
    var qs='?admin=mintLink&type='+encodeURIComponent(document.getElementById('mType').value)+
      '&email='+encodeURIComponent(document.getElementById('mEmail').value)+
      '&name='+encodeURIComponent(nEn)+
      '&nameHebrew='+encodeURIComponent(nHe)+
      '&language='+encodeURIComponent(document.getElementById('mLang').value);
    jget(qs).then(function(r){
      go.disabled=false;go.textContent='Create + email';
      if(r&&r.ok){
        document.getElementById('mResult').innerHTML='<div class="copybox" id="cbox">'+esc(r.url)+'</div><div class="note">'+(r.emailed?'Emailed to the investor. ':'')+'Tap the link to copy.</div>';
        var cb=document.getElementById('cbox');cb.addEventListener('click',function(){
          if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(r.url).then(function(){cb.textContent='Copied';}).catch(function(){cb.textContent='Press and hold the link to copy';});}
          else{cb.textContent='Press and hold the link to copy';}});
        loadList();
      } else { document.getElementById('mResult').innerHTML='<div class="note" style="color:var(--red)">'+esc((r&&r.error)||'Could not create the link.')+'</div>'; }
    }).catch(function(){go.disabled=false;go.textContent='Create + email';document.getElementById('mResult').innerHTML='<div class="note" style="color:var(--red)">Network error.</div>';});
  });

  // ---- poll loop ----
  var left=POLL_MS/1000;
  function tick(){left--;if(left<=0){left=POLL_MS/1000;loadList();}
    if(lastLoadOk){elTick.style.color='';elTick.textContent=left+'s';}
    else{elTick.style.color='#FFD9A0';elTick.textContent='offline, tap to retry';}}
  elTick.style.cursor='pointer';elTick.addEventListener('click',function(){left=0;loadList();});

  // ---- boot: load the board directly ----
  jget('?api=list').then(function(d){bootBoard(d);}).catch(function(){
    board.innerHTML='<div class="empty">Could not reach the server.</div>';
  });
})();
</script>
</body>
</html>
